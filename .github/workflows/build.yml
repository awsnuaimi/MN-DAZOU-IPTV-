name: Build Android App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.13

    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > app/dazou-release-key.jks

    - name: Verify Keystore
      run: |
        if [ -s app/dazou-release-key.jks ]; then
          echo "✅ Keystore file ready"
          ls -la app/dazou-release-key.jks
        else
          echo "❌ Keystore file missing or empty"
          exit 1
        fi

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace

    - name: List actual build outputs (debug)
      run: |
        echo "===== محتوى مجلد app/build/outputs بالكامل ====="
        find app/build/outputs -type f 2>&1 || echo "المجلد app/build/outputs غير موجود إطلاقًا"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DAZOU-IPTV-DEBUG-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Build Release APK
      continue-on-error: true
      env:
        KEYSTORE_PATH: dazou-release-key.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: gradle assembleRelease --stacktrace

    - name: Upload Release APK
      if: success() || failure()
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: DAZOU-IPTV-RELEASE-APK
        path: app/build/outputs/apk/release/app-release.apk